# ============================================================
# application.properties - Configuración principal de la app
# ============================================================
# Este archivo contiene TODAS las configuraciones de tu aplicación.
# Spring Boot lo lee automáticamente al iniciar.

# Nombre de la aplicación (aparece en los logs)
spring.application.name=llamatours-api

# ============================================================
# BASE DE DATOS - H2 (Base de datos en memoria para desarrollo)
# ============================================================
# H2 es una base de datos que vive EN LA MEMORIA RAM.
# Se borra cada vez que detienes la aplicación. Perfecta para desarrollo.
# En producción, cambiarías esto por PostgreSQL, MySQL, etc.

# URL de conexión: jdbc:h2:mem:testdb = base de datos en memoria llamada "testdb"
spring.datasource.url=jdbc:h2:mem:testdb

# Driver: el "conector" que permite a Java hablar con H2
spring.datasource.driverClassName=org.h2.Driver

# Usuario y contraseña por defecto de H2
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE - Mapeo Objeto-Relacional (ORM)
# ============================================================
# JPA convierte tus clases Java (@Entity) en tablas SQL automáticamente.

# ddl-auto=update: Si la tabla no existe, la crea. Si existe, la actualiza.
# Opciones: create (borra y crea), update (actualiza), none (no hace nada)
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Muestra las consultas SQL en la consola (útil para debug)
spring.jpa.show-sql=true
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================================
# H2 CONSOLE - Interfaz web para ver la base de datos
# ============================================================
# Accede en tu navegador: http://localhost:8080/h2-console
# Solo para desarrollo. Desactivar en producción.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JWT - Configuración de tokens de seguridad
# ============================================================
# Clave secreta para firmar los tokens JWT.
# Debe ser una cadena larga en formato Base64.
# IMPORTANTE: En producción, usa variables de entorno, NO pongas esto en el código.
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Tiempo de expiración del token en milisegundos.
# 86400000 ms = 24 horas. Después de esto, el usuario debe volver a login.
jwt.expiration=${JWT_EXPIRATION:86400000}
