# ============================================================
# application.properties - Configuración BASE (compartida)
# ============================================================
# Spring Boot carga este archivo SIEMPRE.
# Las propiedades específicas de cada entorno están en:
#   - application-dev.properties  (local)
#   - application-prod.properties (Render)

# Perfil por defecto: dev (local). En Render se sobreescribe con prod
spring.profiles.active=dev

spring.application.name=llamatours-api
server.port=${PORT:8080}

# ============================================================
# BASE DE DATOS - H2 en memoria
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
