# ============================================================
# application-prod.properties - Configuración PRODUCCIÓN (Supabase PostgreSQL)
# ============================================================
# Se activa con: SPRING_PROFILES_ACTIVE=prod (variable de entorno en Render)

# PostgreSQL via Supabase (variables de entorno)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Oculta SQL en logs
spring.jpa.show-sql=false

# Desactiva H2 Console
spring.h2.console.enabled=false

# HikariCP pool (ajustado para Supabase Free Tier: max 15 conexiones)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
