# ============================================================
# application-dev.properties - Configuración LOCAL (H2)
# ============================================================
# Se activa por defecto (spring.profiles.active=dev en application.properties)

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Muestra SQL en consola (útil para debug)
spring.jpa.show-sql=true

# H2 Console - Interfaz web para ver la BD
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Stripe (modo test)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:5173/payment/success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:5173/checkout}
